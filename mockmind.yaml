server:
  host: 127.0.0.1
  port: 4000

providers:
  # MockMind starts all implemented protocols by default.
  # This field is metadata for compatibility with the project plan and Admin API.
  enabled: all

auth:
  mode: permissive
  apiKeys:
    - test-key

models:
  - id: gpt-4o-mini
    provider: openai
  - id: deepseek-reasoner
    provider: deepseek
  - id: moonshot-v1-8k
    provider: moonshot
  - id: qwen-plus
    provider: aliyun-bailian
  - id: glm-4
    provider: zhipu
  - id: abab6.5s-chat
    provider: minimax
  - id: claude-3-5-sonnet-latest
    provider: anthropic
  - id: gemini-1.5-pro
    provider: gemini

defaults:
  latencyMs: 30
  streamChunkDelayMs: 25

fallback:
  enabled: true
  response:
    type: text
    content: This is a default mock response from mockmind.

scenarios:
  - id: openai-basic
    provider: openai
    endpoint: /v1/chat/completions
    match:
      model: gpt-4o-mini
      messagesContain: hello
    response:
      type: text
      content: Hello from OpenAI-compatible mock.

  - id: openai-tool-weather
    provider: openai
    endpoint: /v1/chat/completions
    match:
      messagesContain: weather
      hasTools: true
    response:
      type: tool_call
      toolName: get_weather
      toolArguments:
        city: Shanghai

  - id: deepseek-reasoning
    provider: deepseek
    endpoint: /v1/chat/completions
    match:
      model: deepseek-reasoner
    response:
      type: text
      reasoningContent: This is mock reasoning content.
      content: This is the final DeepSeek mock answer.

  - id: moonshot-basic
    provider: moonshot
    endpoint: /moonshot/v1/chat/completions
    match:
      model: moonshot-v1-8k
      lastUserMessageContains: hello
    response:
      type: text
      content: Hello from mock Moonshot / Kimi.

  - id: zhipu-basic
    provider: zhipu
    endpoint: /api/paas/v4/chat/completions
    match:
      model: glm-4
      lastUserMessageContains: hello
    response:
      type: text
      content: Hello from mock Zhipu GLM.

  - id: minimax-basic
    provider: minimax
    endpoint: /v1/text/chatcompletion_v2
    match:
      model: abab6.5s-chat
      lastUserMessageContains: hello
    response:
      type: text
      content: 你好，我是模拟的 MiniMax 响应。

  - id: anthropic-basic
    provider: anthropic
    endpoint: /v1/messages
    match:
      model: claude-3-5-sonnet-latest
    response:
      type: text
      content: Hello from mock Anthropic.

  - id: gemini-basic
    provider: gemini
    endpoint: /v1beta/models/gemini-1.5-pro:generateContent
    match:
      model: gemini-1.5-pro
    response:
      type: text
      content: Hello from mock Gemini.

  - id: dashscope-basic
    provider: aliyun-bailian
    endpoint: /api/v1/services/aigc/text-generation/generation
    match:
      model: qwen-plus
    response:
      type: text
      content: 你好，我是模拟的 DashScope 原生响应。

  - id: dashscope-result-format-debug
    provider: aliyun-bailian
    endpoint: /api/v1/services/aigc/text-generation/generation
    priority: 10
    match:
      model: qwen-plus
      lastUserMessageContains: debug
      bodyPath:
        parameters.result_format: message
      query:
        debug: 'true'
    response:
      type: text
      content: Matched DashScope request by nested body path and query.

  - id: anthropic-tool-weather
    provider: anthropic
    endpoint: /v1/messages
    match:
      messagesContain: weather
    response:
      type: tool_call
      toolName: get_weather
      toolArguments:
        city: Shanghai

  - id: gemini-function-weather
    provider: gemini
    endpoint: /v1beta/models/gemini-1.5-pro:generateContent
    match:
      messagesContain: weather
    response:
      type: tool_call
      toolName: get_weather
      toolArguments:
        city: Shanghai
