services:
  mockmind:
    build: .
    image: mockmind:local
    ports:
      - "4000:4000"
    volumes:
      - ./mockmind.yaml:/app/mockmind.yaml:ro
    command: ["node", "dist/cli/index.js", "start", "--config", "mockmind.yaml", "--host", "0.0.0.0", "--port", "4000"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
