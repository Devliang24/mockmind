services:
  mockmind:
    build: .
    image: mockmind:local
    ports:
      - "4000:4000"
    volumes:
      - ./mockmind.yaml:/app/mockmind.yaml:ro
      - mockmind-data:/app/.mockmind
    command: ["node", "dist/cli/index.js", "start", "--config", "mockmind.yaml", "--host", "0.0.0.0", "--port", "4000"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mockmind-data:
